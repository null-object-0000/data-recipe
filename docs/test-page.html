<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataRecipe 测试页</title>
    <style>
      body {
        color: #202124;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 40px;
      }

      main {
        max-width: 760px;
      }

      button {
        border: 1px solid #0f766e;
        border-radius: 6px;
        background: #0f766e;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        margin-right: 10px;
        padding: 10px 14px;
      }

      pre {
        background: #111827;
        border-radius: 8px;
        color: #f9fafb;
        margin-top: 20px;
        min-height: 180px;
        overflow: auto;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DataRecipe 测试页</h1>
      <p>加载插件后打开侧边栏，点击「开始发现」，再点击下面的按钮触发 fetch 或 XHR 请求。</p>
      <button id="fetchButton" type="button">触发 fetch 查询</button>
      <button id="xhrButton" type="button">触发 XHR 查询</button>
      <pre id="output">等待请求...</pre>
    </main>

    <script>
      const output = document.getElementById("output");

      document.getElementById("fetchButton").addEventListener("click", async () => {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts?_page=1&_limit=5");
        const rows = await response.json();
        output.textContent = JSON.stringify(
          {
            total: 100,
            page: 1,
            records: rows
          },
          null,
          2
        );
      });

      document.getElementById("xhrButton").addEventListener("click", () => {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "https://jsonplaceholder.typicode.com/users?page=1&pageSize=5");
        xhr.onload = () => {
          output.textContent = JSON.stringify(
            {
              count: 10,
              list: JSON.parse(xhr.responseText)
            },
            null,
            2
          );
        };
        xhr.send();
      });
    </script>
  </body>
</html>
